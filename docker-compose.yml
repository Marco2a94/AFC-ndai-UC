services:
  db:
    image: postgres:15
    container_name: afc_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d

  api:
    build: ./api
    container_name: afc_api
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"

  metabase:
    image: metabase/metabase:latest
    container_name: afc_metabase
    depends_on:
      - db
    ports:
      - "3000:3000"

volumes:
  postgres_data: